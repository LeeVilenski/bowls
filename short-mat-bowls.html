<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Short Mat Bowls</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0f1e;
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px;
  min-height: 100vh;
  user-select: none;
}
h1 { font-size: 18px; color: #60a5fa; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }
#canvas { display: block; border-radius: 6px; cursor: crosshair; max-width: 100%; }
#hud { display: flex; align-items: stretch; gap: 10px; margin-top: 10px; width: 440px; max-width: 100%; }
.sbox { background: #1e293b; border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 80px; }
.sbox .lbl { font-size: 11px; opacity: 0.55; margin-bottom: 2px; }
.sbox .val { font-size: 26px; font-weight: 700; }
.p1 .val { color: #60a5fa; }
.p2 .val { color: #f87171; }
#msgBox {
  flex: 1; background: #1e293b; border-radius: 8px;
  padding: 8px 12px; display: flex; align-items: center;
  justify-content: center; font-size: 13px; text-align: center; line-height: 1.4;
}
#controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
button {
  padding: 8px 14px; border: none; border-radius: 6px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
}
button:hover { opacity: .85; transform: scale(1.04); }
#btnMode { background: #7c3aed; color: #fff; }
#btnBias { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
#btnNew  { background: #1d4ed8; color: #fff; }
#biasRow {
  margin-top: 8px; display: flex; align-items: center; gap: 10px;
  background: #1e293b; border-radius: 8px; padding: 8px 16px; width: 440px; max-width: 100%;
}
#biasRow label { font-size: 12px; opacity: 0.75; white-space: nowrap; }
#biasSlider { flex: 1; accent-color: #60a5fa; cursor: pointer; }
#biasValLabel { color: #60a5fa; font-weight: 700; font-size: 13px; min-width: 30px; }
</style>
</head>
<body>
<h1>Short Mat Bowls</h1>
<canvas id="canvas" width="440" height="840"></canvas>
<div id="hud">
  <div class="sbox p1"><div class="lbl" id="lbl1">Player 1</div><div class="val" id="sc1">0</div></div>
  <div id="msgBox">Press <strong>New Game</strong> to start</div>
  <div class="sbox p2"><div class="lbl" id="lbl2">AI</div><div class="val" id="sc2">0</div></div>
</div>
<div id="controls">
  <button id="btnMode">Mode: vs AI</button>
  <button id="btnBias">Bias: Right ↗</button>
  <button id="btnNew">New Game</button>
</div>
<div id="biasRow">
  <label>Bias strength:</label>
  <input type="range" id="biasSlider" min="0" max="2.5" step="0.1" value="1">
  <span id="biasValLabel">1.0×</span>
</div>

<script>
// ── Canvas & core layout ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 440, H = 840;

const MAT = { x: 70, y: 40, w: 300, h: 760 };

// End boards (white timber at each end — bowl or jack hitting these → dead)
const BOARD_H   = 16;
const FAR_BOARD  = { x: MAT.x - 4, y: MAT.y - BOARD_H, w: MAT.w + 8, h: BOARD_H };
const NEAR_BOARD = { x: MAT.x - 4, y: MAT.y + MAT.h,   w: MAT.w + 8, h: BOARD_H };

// Centre block (navigating around it is the challenge; hitting it → bowl dead)
const FW = 88, FH = 22;
const FENDER = { x: MAT.x + MAT.w/2 - FW/2, y: MAT.y + MAT.h/2 - FH/2, w: FW, h: FH };

// Proportional positions along mat (from near/delivery end)
const DEAD_LINE_FRAC  = 0.165; // dead line (bowl must cross this from delivery end)
const DELIV_OUTER_FRAC = 0.10; // outer delivery line
const DELIV_INNER_FRAC = 0.135; // inner delivery line
const JACK_LINE_FRAC  = 0.85;  // jack line (from near end = 85% up mat)

const RB = 13, RJ = 7;
const MAX_SPD  = 22;
const FRICTION = 0.9865;
const BIAS_K   = 0.018;

const C = {
  bg:'#0a0f1e', mat:'#1a6b35', matAlt:'#1f7d3e', border:'#0a3d1c',
  board:'#f0ead8', boardShadow:'#c8b89a',
  line:'rgba(255,255,255,0.7)',
  fen:'#92400e', fenTop:'#d97706',
  jack:'#fef08a', jackS:'#ca8a04',
  p1:'#3b82f6', p1d:'#1d4ed8',
  p2:'#ef4444', p2d:'#b91c1c',
};

// ── Game state ────────────────────────────────────────────────────
let mode     = 'vs-ai';
let state    = 'idle';
let biasDir  = 'right';
let biasMult = 1.0;

let bowls    = [];
let jack     = null;
let scores   = [0, 0];
let endNum   = 1;
let jackOwner = 1;
let turnIdx   = 0;
let delivDir  = 1;   // 1 = bowl from bottom; -1 = from top
let aiTimer   = null;

let mouse    = { x: 0, y: 0, down: false };
let aimActive = false;

// ── Position helpers ──────────────────────────────────────────────
function bowlStart() {
  const cx = MAT.x + MAT.w / 2;
  return delivDir === 1
    ? { x: cx, y: MAT.y + MAT.h - 28 }
    : { x: cx, y: MAT.y + 28 };
}

function jackLineY() {
  return delivDir === 1
    ? MAT.y + MAT.h * (1 - JACK_LINE_FRAC)
    : MAT.y + MAT.h * JACK_LINE_FRAC;
}

function deadLineY() {
  return delivDir === 1
    ? MAT.y + MAT.h * DEAD_LINE_FRAC
    : MAT.y + MAT.h * (1 - DEAD_LINE_FRAC);
}

function delivInnerY() {
  return delivDir === 1
    ? MAT.y + MAT.h * DELIV_INNER_FRAC
    : MAT.y + MAT.h * (1 - DELIV_INNER_FRAC);
}

function delivOuterY() {
  return delivDir === 1
    ? MAT.y + MAT.h * DELIV_OUTER_FRAC
    : MAT.y + MAT.h * (1 - DELIV_OUTER_FRAC);
}

// Is this bowl on the wrong side of the dead line (didn't travel far enough)?
function isShortOfDeadLine(b) {
  return delivDir === 1
    ? b.y > deadLineY()
    : b.y < deadLineY();
}

function playerForTurn(t) {
  const other = jackOwner === 1 ? 2 : 1;
  return t % 2 === 0 ? jackOwner : other;
}

function allStopped() {
  if (jack && !jack.stopped && !jack.offMat) return false;
  return bowls.every(b => b.stopped || b.offMat);
}

function msg(html) { document.getElementById('msgBox').innerHTML = html; }
function updateHUD() {
  document.getElementById('sc1').textContent = scores[0];
  document.getElementById('sc2').textContent = scores[1];
}

// ── Physics ───────────────────────────────────────────────────────
function applyBias(obj, bias) {
  const spd = Math.hypot(obj.vx, obj.vy);
  if (spd < 0.01) return;
  const nx = obj.vx/spd, ny = obj.vy/spd;
  const sign = bias === 'right' ? 1 : -1;
  obj.vx += -ny * sign * BIAS_K * biasMult * spd;
  obj.vy +=  nx * sign * BIAS_K * biasMult * spd;
}

function stepObj(obj, bias) {
  if (obj.stopped || obj.offMat) return;

  const spd = Math.hypot(obj.vx, obj.vy);
  if (spd < 0.22) {
    obj.stopped = true; obj.vx = obj.vy = 0;
    // Bowl stopped short of dead line → dead
    if (obj !== jack && isShortOfDeadLine(obj)) obj.offMat = true;
    return;
  }

  if (bias) applyBias(obj, bias);
  obj.vx *= FRICTION; obj.vy *= FRICTION;
  obj.x  += obj.vx;  obj.y  += obj.vy;

  const r = obj === jack ? RJ : RB;

  // Side walls
  if (obj.x - r < MAT.x)         { obj.offMat = true; obj.stopped = true; return; }
  if (obj.x + r > MAT.x + MAT.w) { obj.offMat = true; obj.stopped = true; return; }

  // End boards — hitting either end board kills the object
  if (obj.y - r < MAT.y || obj.y + r > MAT.y + MAT.h) {
    obj.offMat = true; obj.stopped = true; return;
  }

  // Centre block — hitting the block kills the bowl / jack
  const fx1 = FENDER.x, fx2 = FENDER.x + FENDER.w;
  const fy1 = FENDER.y, fy2 = FENDER.y + FENDER.h;
  if (obj.x - r < fx2 && obj.x + r > fx1 && obj.y - r < fy2 && obj.y + r > fy1) {
    obj.offMat = true; obj.stopped = true;
    // Small visual nudge so dead bowl doesn't overlap the block
    if (obj.y < fy1 + FH/2) obj.y = fy1 - r - 2;
    else                     obj.y = fy2 + r + 2;
  }
}

function stepCollisions() {
  for (let i = 0; i < bowls.length; i++) {
    const a = bowls[i];
    if (a.offMat) continue;
    for (let j = i+1; j < bowls.length; j++) {
      const b = bowls[j];
      if (b.offMat) continue;
      collide(a, b, RB, RB, 0.75);
    }
    if (jack && !jack.offMat) collide(a, jack, RB, RJ, 0.85);
  }
}

function collide(a, b, ra, rb, rest) {
  const dx = b.x-a.x, dy = b.y-a.y;
  const dist = Math.hypot(dx, dy);
  const minD = ra + rb;
  if (dist >= minD || dist < 0.01) return;
  const nx = dx/dist, ny = dy/dist;
  const rel = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
  if (rel > 0) {
    const imp = rel * rest;
    a.vx -= imp*nx; a.vy -= imp*ny;
    b.vx += imp*nx; b.vy += imp*ny;
    a.stopped = false; b.stopped = false;
  }
  const ov = (minD-dist)/2;
  a.x -= nx*ov; a.y -= ny*ov;
  b.x += nx*ov; b.y += ny*ov;
}

// ── Trajectory simulation (preview & AI) ─────────────────────────
function simPath(sx, sy, angle, speed, bias, bMult) {
  let x = sx, y = sy;
  let vx = Math.cos(angle)*speed, vy = Math.sin(angle)*speed;
  const path = [{x, y}];

  for (let i = 0; i < 700; i++) {
    const spd = Math.hypot(vx, vy);
    if (spd < 0.22) break;
    const nx = vx/spd, ny = vy/spd;
    const sign = bias === 'right' ? 1 : -1;
    vx += -ny * sign * BIAS_K * bMult * spd;
    vy +=  nx * sign * BIAS_K * bMult * spd;
    vx *= FRICTION; vy *= FRICTION;
    x += vx; y += vy;
    if (x < MAT.x || x > MAT.x+MAT.w || y < MAT.y || y > MAT.y+MAT.h) break;
    if (x-RB < FENDER.x+FENDER.w && x+RB > FENDER.x &&
        y-RB < FENDER.y+FENDER.h && y+RB > FENDER.y) { path.push({x,y}); break; }
    path.push({x, y});
  }
  return path;
}

// ── AI ────────────────────────────────────────────────────────────
function aiPickShot() {
  if (!jack || jack.offMat) return null;
  const bs  = bowlStart();
  const jx  = jack.x, jy = jack.y;
  const base = Math.atan2(jy - bs.y, jx - bs.x);

  let bestAngle = base, bestPower = 0.6*MAX_SPD, bestDist = Infinity;

  for (let da = -55; da <= 55; da += 2.5) {
    const angle = base + da * Math.PI/180;
    for (const pct of [0.38, 0.50, 0.62, 0.74, 0.86]) {
      const spd = pct * MAX_SPD;
      const path = simPath(bs.x, bs.y, angle, spd, biasDir, biasMult);
      const end  = path[path.length-1];
      const d    = Math.hypot(end.x - jx, end.y - jy);
      if (d < bestDist) { bestDist = d; bestAngle = angle; bestPower = spd; }
    }
  }

  return {
    angle: bestAngle + (Math.random()-0.5)*0.16,
    speed: bestPower * (0.93 + Math.random()*0.14)
  };
}

// ── Scoring ───────────────────────────────────────────────────────
function scoreEnd() {
  if (!jack || jack.offMat) return null;
  const dists = bowls
    .filter(b => !b.offMat)
    .map(b => ({ p: b.player, d: Math.hypot(b.x-jack.x, b.y-jack.y) }))
    .sort((a,b) => a.d - b.d);
  if (!dists.length) return null;
  const winner = dists[0].p;
  let pts = 0;
  for (const e of dists) { if (e.p === winner) pts++; else break; }
  return { winner, pts };
}

// ── Game flow ─────────────────────────────────────────────────────
function startGame() {
  clearTimeout(aiTimer);
  bowls=[]; jack=null; scores=[0,0]; endNum=1;
  jackOwner=1; turnIdx=0; delivDir=1;
  updateHUD(); startEnd();
}

function startEnd() {
  bowls=[]; jack=null; turnIdx=0;
  state='place-jack';
  const jly = jackLineY();
  if (jackOwner === 2 && mode === 'vs-ai') {
    aiPlaceJack(jly);
  } else {
    const who = jackOwner===1
      ? '<span style="color:#60a5fa">Player 1</span>'
      : '<span style="color:#f87171">Player 2</span>';
    msg(`End ${endNum}/${ENDS} — ${who}: click the jack line to place the jack`);
  }
}

function aiPlaceJack(jly) {
  const margin = 30;
  jack = {
    x: MAT.x + margin + Math.random()*(MAT.w - margin*2),
    y: jly,
    vx:0, vy:0, stopped:true, offMat:false
  };
  beginTurns();
}

function beginTurns() { promptPlayer(playerForTurn(turnIdx)); }

function promptPlayer(p) {
  if (p === 2 && mode === 'vs-ai') {
    state = 'ai-turn';
    msg(`End ${endNum}/${ENDS} — <span style="color:#f87171">AI</span> is aiming…`);
    aiTimer = setTimeout(() => {
      if (state !== 'ai-turn') return;
      const shot = aiPickShot();
      if (!shot) return;
      deliverBowl(p, shot.angle, shot.speed);
    }, 1100);
  } else {
    state = 'aim';
    const col  = p===1 ? '#60a5fa' : '#f87171';
    const name = p===1 ? 'Player 1' : 'Player 2';
    msg(`End ${endNum}/${ENDS} — <span style="color:${col}">${name}</span>: drag from the delivery mark`);
  }
}

function deliverBowl(player, angle, speed) {
  const bs = bowlStart();
  bowls.push({x:bs.x, y:bs.y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
              player, bias:biasDir, stopped:false, offMat:false});
  state = 'moving';
}

const BPP = 4, ENDS = 6;

function onAllStopped() {
  turnIdx++;
  if (turnIdx >= BPP*2) { finishEnd(); return; }
  promptPlayer(playerForTurn(turnIdx));
}

function finishEnd() {
  state = 'end-result';
  const res = scoreEnd();
  if (res) {
    scores[res.winner-1] += res.pts;
    updateHUD();
    const col  = res.winner===1 ? '#60a5fa' : '#f87171';
    const name = res.winner===1 ? 'Player 1' : (mode==='vs-ai' ? 'AI' : 'Player 2');
    msg(`End ${endNum} — <span style="color:${col}">${name}</span> scores ${res.pts} point${res.pts!==1?'s':''}! Click to continue.`);
    jackOwner = res.winner;
  } else {
    msg(`End ${endNum} — Dead end (no jack in play). Click to continue.`);
  }
}

function advanceEnd() {
  endNum++;
  if (endNum > ENDS) { gameOver(); return; }
  delivDir = -delivDir;
  startEnd();
}

function gameOver() {
  state = 'game-over';
  const n2 = mode==='vs-ai' ? 'AI' : 'Player 2';
  let res;
  if (scores[0]>scores[1])      res=`<span style="color:#60a5fa">Player 1 wins</span> ${scores[0]}–${scores[1]}`;
  else if (scores[1]>scores[0]) res=`<span style="color:#f87171">${n2} wins</span> ${scores[1]}–${scores[0]}`;
  else                          res=`Draw! ${scores[0]}–${scores[1]}`;
  msg(`Game over — ${res}. Press New Game to play again.`);
}

// ── Drawing ───────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  drawMat();
  if (jack && !jack.offMat) drawJack();
  for (const b of bowls) drawBowl(b);
  if (state==='aim' && mouse.down && aimActive) drawAim();
  drawSidePanels();
}

function drawMat() {
  // Alternating stripes
  for (let i=0; i<MAT.h; i+=50) {
    ctx.fillStyle = Math.floor(i/50)%2===0 ? C.mat : C.matAlt;
    ctx.fillRect(MAT.x, MAT.y+i, MAT.w, Math.min(50, MAT.h-i));
  }

  // End boards (white timber)
  [FAR_BOARD, NEAR_BOARD].forEach(b => {
    ctx.fillStyle = C.boardShadow;
    ctx.fillRect(b.x+2, b.y+3, b.w, b.h);
    ctx.fillStyle = C.board;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Wood grain lines
    ctx.strokeStyle = 'rgba(160,140,110,0.5)'; ctx.lineWidth = 1;
    for (let gx = b.x+10; gx < b.x+b.w-5; gx+=18) {
      ctx.beginPath(); ctx.moveTo(gx, b.y+2); ctx.lineTo(gx, b.y+b.h-2); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(80,60,30,0.4)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  });

  // Mat border
  ctx.strokeStyle = C.border; ctx.lineWidth = 5;
  ctx.strokeRect(MAT.x, MAT.y, MAT.w, MAT.h);

  // ── Mat lines ──────────────────────────────────────────────────
  function hLine(y, color, width, dash=[]) {
    ctx.strokeStyle = color; ctx.lineWidth = width;
    ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(MAT.x, y); ctx.lineTo(MAT.x+MAT.w, y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Dead line (solid white) — bowl must cross this to be active
  hLine(deadLineY(), C.line, 2);

  // Delivery lines (solid white, two parallel lines)
  hLine(delivInnerY(), C.line, 1.5);
  hLine(delivOuterY(), C.line, 1.5);

  // Jack line (dashed yellow) — jack placed here
  hLine(jackLineY(), 'rgba(255,220,50,0.85)', 2, [6,4]);

  // Dead line label
  const dlY  = deadLineY();
  const dlLX = delivDir===1 ? MAT.x+6 : MAT.x+MAT.w-6;
  const dlAlign = delivDir===1 ? 'left' : 'right';
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='9px Segoe UI';
  ctx.textAlign=dlAlign; ctx.textBaseline='bottom';
  ctx.fillText('DEAD LINE', dlLX, dlY-2);

  // Jack line label
  const jlY = jackLineY();
  ctx.fillStyle='rgba(255,220,50,0.55)'; ctx.font='9px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('JACK LINE', MAT.x+MAT.w/2, jlY-2);
  ctx.textBaseline='alphabetic';

  // Jack-line highlight when placing
  if (state==='place-jack') {
    ctx.fillStyle='rgba(255,220,50,0.12)';
    ctx.fillRect(MAT.x, jlY-1, MAT.w, 2);
    // Glow
    ctx.strokeStyle='rgba(255,220,50,0.6)'; ctx.lineWidth=3; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(MAT.x, jlY); ctx.lineTo(MAT.x+MAT.w, jlY); ctx.stroke();
  }

  // Centre block
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(FENDER.x+3, FENDER.y+3, FENDER.w, FENDER.h);
  ctx.fillStyle=C.fen;
  ctx.fillRect(FENDER.x, FENDER.y, FENDER.w, FENDER.h);
  ctx.fillStyle=C.fenTop;
  ctx.fillRect(FENDER.x, FENDER.y, FENDER.w, 5);
  ctx.fillStyle='rgba(255,200,100,0.3)';
  ctx.fillRect(FENDER.x, FENDER.y+5, 4, FENDER.h-5);
  ctx.fillStyle='#fde68a'; ctx.font='bold 9px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('BLOCK', MAT.x+MAT.w/2, FENDER.y+FENDER.h/2);
  ctx.textBaseline='alphabetic';

  // Subtle gap hints at block sides
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  const gY = FENDER.y+FENDER.h/2;
  ctx.beginPath(); ctx.moveTo(MAT.x+4,gY); ctx.lineTo(FENDER.x-4,gY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(FENDER.x+FENDER.w+4,gY); ctx.lineTo(MAT.x+MAT.w-4,gY); ctx.stroke();
  ctx.setLineDash([]);

  // Delivery mat marker
  const bs = bowlStart();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(bs.x-22, bs.y-4, 44, 8);

  // End counter
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='11px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText(`End ${endNum} of ${ENDS}`, MAT.x+MAT.w/2, MAT.y-10);
}

function drawJack() {
  ctx.beginPath(); ctx.arc(jack.x+1,jack.y+2,RJ,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();
  const g=ctx.createRadialGradient(jack.x-2,jack.y-2,1,jack.x,jack.y,RJ);
  g.addColorStop(0,'#fffde0'); g.addColorStop(1,'#ca8a04');
  ctx.beginPath(); ctx.arc(jack.x,jack.y,RJ,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=C.jackS; ctx.lineWidth=1.5; ctx.stroke();
}

function drawBowl(b) {
  if (b.offMat) return;
  const c  = b.player===1 ? C.p1 : C.p2;
  const cd = b.player===1 ? C.p1d: C.p2d;

  ctx.beginPath(); ctx.arc(b.x+2,b.y+3,RB,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();

  const g=ctx.createRadialGradient(b.x-4,b.y-4,2,b.x,b.y,RB);
  g.addColorStop(0,c); g.addColorStop(1,cd);
  ctx.beginPath(); ctx.arc(b.x,b.y,RB,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1; ctx.stroke();

  // Bias dot
  const dotX = b.x+(b.bias==='right'?5:-5);
  ctx.beginPath(); ctx.arc(dotX,b.y-4,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();

  // Player label
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 9px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b.player, b.x, b.y+2);
  ctx.textBaseline='alphabetic';
}

function drawAim() {
  const bs = bowlStart();
  const dx = mouse.x-bs.x, dy = mouse.y-bs.y;
  const dist = Math.hypot(dx,dy);
  if (dist < 8) return;
  const angle = Math.atan2(dy,dx);
  const power = Math.min(dist, 230);
  const speed = (power/230)*MAX_SPD;
  const pct   = power/230;

  const path = simPath(bs.x, bs.y, angle, speed, biasDir, biasMult);
  if (path.length > 1) {
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    for (const p of path) ctx.lineTo(p.x, p.y);
    ctx.strokeStyle='rgba(255,225,50,0.45)'; ctx.lineWidth=2;
    ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
    const ep = path[path.length-1];
    ctx.beginPath(); ctx.arc(ep.x,ep.y,RB,0,Math.PI*2);
    ctx.fillStyle = playerForTurn(turnIdx)===1 ? 'rgba(59,130,246,0.4)' : 'rgba(239,68,68,0.4)';
    ctx.fill();
  }

  // Direction stub
  ctx.beginPath(); ctx.moveTo(bs.x,bs.y);
  ctx.lineTo(bs.x+Math.cos(angle)*45, bs.y+Math.sin(angle)*45);
  ctx.strokeStyle='rgba(255,230,50,0.8)'; ctx.lineWidth=2; ctx.stroke();

  // Power arc
  ctx.beginPath();
  ctx.arc(bs.x,bs.y,24,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
  ctx.strokeStyle=`hsl(${120*(1-pct)},100%,55%)`; ctx.lineWidth=4; ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font='10px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText(Math.round(pct*100)+'%', bs.x, bs.y-30);
}

function drawSidePanels() {
  // Left — P1
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,68,H);
  ctx.fillStyle=C.p1; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('P1',34,55);
  for (let i=0;i<BPP;i++) {
    const bowled = bowls.filter(b=>b.player===1).length > i;
    ctx.beginPath(); ctx.arc(34,72+i*30,10,0,Math.PI*2);
    ctx.fillStyle = bowled ? 'rgba(59,130,246,0.25)' : C.p1; ctx.fill();
    ctx.strokeStyle=C.p1d; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Right — P2/AI
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(W-68,0,68,H);
  const lbl2 = mode==='vs-ai'?'AI':'P2';
  ctx.fillStyle=C.p2; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(lbl2,W-34,55);
  for (let i=0;i<BPP;i++) {
    const bowled = bowls.filter(b=>b.player===2).length > i;
    ctx.beginPath(); ctx.arc(W-34,72+i*30,10,0,Math.PI*2);
    ctx.fillStyle = bowled ? 'rgba(239,68,68,0.25)' : C.p2; ctx.fill();
    ctx.strokeStyle=C.p2d; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Active player dot
  if (state==='aim'||state==='ai-turn') {
    const cur=playerForTurn(turnIdx);
    const ax=cur===1?34:W-34;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath(); ctx.arc(ax,45,6,0,Math.PI*2); ctx.fill();
  }

  // Distance lines + leader star
  if (jack && !jack.offMat && bowls.some(b=>!b.offMat)) drawDistances();
}

function drawDistances() {
  const dists = bowls
    .filter(b=>!b.offMat)
    .map(b=>({b, d:Math.hypot(b.x-jack.x, b.y-jack.y)}))
    .sort((a,b)=>a.d-b.d);
  for (const e of dists.slice(0,6)) {
    ctx.beginPath(); ctx.moveTo(e.b.x,e.b.y); ctx.lineTo(jack.x,jack.y);
    ctx.strokeStyle=e.b.player===1?'rgba(96,165,250,0.22)':'rgba(248,113,113,0.22)';
    ctx.lineWidth=1; ctx.stroke();
  }
  if (dists.length) {
    const lb=dists[0].b;
    ctx.fillStyle='#fbbf24'; ctx.font='12px serif';
    ctx.textAlign='center'; ctx.fillText('★',lb.x,lb.y-18);
  }
}

// ── Main loop ─────────────────────────────────────────────────────
function loop() {
  if (state==='moving') {
    for (let s=0;s<3;s++) {
      for (const b of bowls) stepObj(b, b.bias);
      stepObj(jack, null);
      stepCollisions();
    }
    if (allStopped()) onAllStopped();
  }
  draw();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────
function getPos(e) {
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left)*sx, y:(cy-r.top)*sy};
}

canvas.addEventListener('mousedown', e => {
  const p=getPos(e);
  mouse={x:p.x,y:p.y,down:true};

  if (state==='place-jack') {
    // Snap y to jack line; x must be within mat
    if (p.x >= MAT.x+RJ && p.x <= MAT.x+MAT.w-RJ) {
      jack={x:p.x, y:jackLineY(), vx:0, vy:0, stopped:true, offMat:false};
      beginTurns();
    } else {
      msg('Click somewhere on the jack line (inside the mat)!');
    }
  } else if (state==='aim') {
    aimActive=true;
  } else if (state==='end-result') {
    advanceEnd();
  }
});

canvas.addEventListener('mousemove', e => { const p=getPos(e); mouse.x=p.x; mouse.y=p.y; });

canvas.addEventListener('mouseup', () => {
  if (state==='aim' && aimActive && mouse.down) {
    const bs=bowlStart();
    const dx=mouse.x-bs.x, dy=mouse.y-bs.y;
    const dist=Math.hypot(dx,dy);
    if (dist>10) {
      deliverBowl(playerForTurn(turnIdx), Math.atan2(dy,dx), Math.min(dist,230)/230*MAX_SPD);
    }
  }
  aimActive=false; mouse.down=false;
});

canvas.addEventListener('touchstart', e=>{e.preventDefault();canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();canvas.dispatchEvent(new MouseEvent('mouseup',{}));},{passive:false});

// Buttons
document.getElementById('btnMode').addEventListener('click',()=>{
  mode=mode==='vs-ai'?'vs-player':'vs-ai';
  document.getElementById('btnMode').textContent=`Mode: ${mode==='vs-ai'?'vs AI':'2 Players'}`;
  document.getElementById('lbl2').textContent=mode==='vs-ai'?'AI':'Player 2';
});

document.getElementById('btnBias').addEventListener('click',()=>{
  biasDir=biasDir==='right'?'left':'right';
  document.getElementById('btnBias').textContent=`Bias: ${biasDir==='right'?'Right ↗':'Left ↖'}`;
});

document.getElementById('btnNew').addEventListener('click',startGame);

// Bias strength slider
document.getElementById('biasSlider').addEventListener('input', e => {
  biasMult = parseFloat(e.target.value);
  document.getElementById('biasValLabel').textContent = biasMult.toFixed(1) + '×';
});

requestAnimationFrame(loop);
</script>
</body>

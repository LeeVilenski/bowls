<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bowls">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Short Mat Bowls</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100dvh;
  background: #0a0f1e;
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* Canvas fills available height, width follows aspect ratio */
#canvas-wrap {
  flex: 1;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
  min-height: 0;
}
#canvas {
  display: block;
  touch-action: none;
  cursor: crosshair;
  height: 100%;
  width: auto;
  max-width: 100%;
}

/* Compact bottom bar */
#bar {
  flex-shrink: 0;
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: #111827;
  border-top: 1px solid #1e293b;
}
.sbox { text-align: center; min-width: 48px; }
.sbox .lbl { font-size: 10px; opacity: 0.5; line-height: 1; }
.sbox .val { font-size: 22px; font-weight: 700; line-height: 1.1; }
.p1 .val { color: #60a5fa; }
.p2 .val { color: #f87171; }
#msgBox {
  flex: 1; font-size: 11px; text-align: center; line-height: 1.3;
  padding: 0 4px; opacity: 0.9;
}
#btnGroup { display: flex; gap: 4px; }
button {
  padding: 7px 10px; border: none; border-radius: 6px; font-size: 11px;
  font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent;
  min-height: 36px; white-space: nowrap;
}
button:active { opacity: .7; }
#btnMode { background: #7c3aed; color: #fff; }
#btnBias { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
#btnNew  { background: #1d4ed8; color: #fff; }

/* ── Splash / Settings overlay ───────────────────────────────────── */
#splash {
  position: fixed; inset: 0; z-index: 200;
  background: #0a0f1e;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; align-items: center;
  padding-top: max(env(safe-area-inset-top), 12px);
  padding-bottom: max(env(safe-area-inset-bottom), 16px);
}
#splash.hidden { display: none; }
#spl-inner {
  width: 100%; max-width: 440px;
  padding: 0 14px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.spl-title {
  text-align: center; padding: 10px 0 2px;
  font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px;
}
.spl-title em { color: #60a5fa; font-style: normal; }
.spl-card {
  background: #111827; border-radius: 12px; border: 1px solid #1e293b;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 10px;
}
.spl-head {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.2px; color: #475569;
}
.spl-row {
  display: flex; align-items: center; gap: 8px; min-height: 32px;
}
.spl-lbl { font-size: 12px; color: #94a3b8; width: 66px; flex-shrink: 0; }
.seg { display: flex; gap: 4px; flex-wrap: wrap; }
.seg button {
  padding: 5px 11px; font-size: 11px; font-weight: 600;
  background: #1e293b; color: #64748b;
  border-radius: 6px; border: 1px solid #334155; min-height: 30px;
}
.seg button.sel { background: #1d4ed8; color: #fff; border-color: #3b82f6; }
.swatches { display: flex; gap: 6px; flex-wrap: wrap; }
.sw {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid transparent; cursor: pointer; flex-shrink: 0;
  transition: transform .12s;
}
.sw.sel { border-color: #fff; transform: scale(1.2); }
.spl-row input[type=range] { flex: 1; accent-color: #60a5fa; }
.rval { font-size: 12px; font-weight: 700; color: #60a5fa; min-width: 18px; text-align: right; }
.bg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bg-opt {
  height: 52px; border-radius: 10px; border: 2.5px solid transparent;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.bg-opt.sel { border-color: #60a5fa; }
.bg-hardwood      { background: linear-gradient(135deg,#8B5C20,#5a3510); }
.bg-green-carpet  { background: linear-gradient(135deg,#1a5c2a,#0d3317); }
.bg-blue-carpet   { background: linear-gradient(135deg,#1a3a6b,#0d1f3d); }
.bg-red-carpet    { background: linear-gradient(135deg,#6b1a1a,#3d0d0d); }
#btnStart {
  padding: 14px; font-size: 15px; font-weight: 800;
  background: linear-gradient(135deg,#1d4ed8,#6d28d9);
  color: #fff; border-radius: 12px; border: none; width: 100%;
  box-shadow: 0 4px 20px rgba(109,40,217,0.35); letter-spacing: 0.3px;
}

/* Bias slider row */
#biasRow {
  flex-shrink: 0;
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px 6px;
  background: #111827;
}
#biasRow label { font-size: 11px; opacity: 0.6; white-space: nowrap; }
#biasSlider { flex: 1; accent-color: #60a5fa; }
#biasValLabel { color: #60a5fa; font-weight: 700; font-size: 12px; min-width: 28px; }
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="canvas" width="440" height="840"></canvas>
</div>
<div id="bar">
  <div class="sbox p1"><div class="lbl" id="lbl1">P1</div><div class="val" id="sc1">0</div></div>
  <div id="msgBox">Press <strong>New Game</strong></div>
  <div id="btnGroup">
    <button id="btnBias">↗ R</button>
    <button id="btnNew">New</button>
    <button id="btnMode">vs AI</button>
  </div>
  <div class="sbox p2"><div class="lbl" id="lbl2">AI</div><div class="val" id="sc2">0</div></div>
</div>
<div id="biasRow">
  <label>Bias:</label>
  <input type="range" id="biasSlider" min="0" max="1.0" step="0.05" value="0.15">
  <span id="biasValLabel">0.15×</span>
</div>

<div id="splash">
  <div id="spl-inner">
    <div class="spl-title">Short Mat <em>Bowls</em></div>

    <div class="spl-card">
      <div class="spl-head">Game</div>
      <div class="spl-row"><span class="spl-lbl">Ends</span><div class="seg" id="sEnds"></div></div>
      <div class="spl-row"><span class="spl-lbl">Mode</span><div class="seg" id="sMode"></div></div>
    </div>

    <div class="spl-card">
      <div class="spl-head">Bowls</div>
      <div class="spl-row">
        <span class="spl-lbl">Size</span>
        <input type="range" id="sSizeSlider" min="0" max="5" step="1" value="3">
        <span class="rval" id="sSizeLbl">3</span>
      </div>
      <div class="spl-row"><span class="spl-lbl">Bias</span><div class="seg" id="sBias"></div></div>
      <div class="spl-row"><span class="spl-lbl">Player 1</span><div class="swatches" id="sP1"></div></div>
      <div class="spl-row"><span class="spl-lbl">Player 2</span><div class="swatches" id="sP2"></div></div>
    </div>

    <div class="spl-card">
      <div class="spl-head">Background</div>
      <div class="bg-grid" id="sBg"></div>
    </div>

    <button id="btnStart">Start Game</button>
  </div>
</div>

<script>
// ── Canvas & core layout ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 440, H = 840;

const MAT = { x: 70, y: 40, w: 300, h: 760 };

// End boards — white timber at each end, bowl/jack hitting them → dead
const BOARD_H    = 16;
const FAR_BOARD  = { x: MAT.x - 4, y: MAT.y - BOARD_H, w: MAT.w + 8, h: BOARD_H };
const NEAR_BOARD = { x: MAT.x - 4, y: MAT.y + MAT.h,   w: MAT.w + 8, h: BOARD_H };

// Centre block — hitting it → bowl dead
const FW = 14, FH = 24; // 3in wide × 15in long on a 6ft×40ft mat
const FENDER = { x: MAT.x + MAT.w/2 - FW/2, y: MAT.y + MAT.h/2 - FH/2, w: FW, h: FH };

// ── Symmetric mat layout — from ESMBA Laws (13000mm mat, 1830mm wide) ────────
// DITCH line:  300mm from each fender      → 300/13000  = 0.023
// DEAD line:   2745mm from each ditch      → 3045/13000 = 0.234  (bowl must pass this)
// JACK line:   short vertical mark centred on mat width, running ALONG the mat direction
//   near tip from far end: 1215mm from far fender → 1215/13000 = 0.093
//   far  tip from far end: 2130mm from far fender → 2130/13000 = 0.164
// Delivery lines: 1370mm long from ditch toward centre, ±330mm from centre line
// Delivery mat:   610mm long × 356mm wide, sits in ditch zone against fender
const L = {
  DITCH:     0.023, // ditch line — 1ft from each fender
  DEAD:      0.234, // dead line — bowl must travel past this from delivery end
  JACK_N:    0.093, // jack line near tip (from far end, toward centre)
  JACK_F:    0.164, // jack line far  tip (from far end, toward far fender)
  // Delivery lines: used for visual only
  DELIV_LEN: 0.105, // 1370mm/13000 — length of delivery bracket lines (from ditch toward centre)
  DELIV_X:   0.054, // 330mm/1830*0.300px — side offset of delivery lines (fraction of mat width... actual px: 330/1830*300=54px)
  MAT_LEN:   0.047, // 610mm/13000 — delivery mat extends this far from near fender
};

// Centre block: 3in wide × 15in long on a 6ft×40ft mat
// In pixels: 3/72*300 ≈ 13px wide, 15/480*760 ≈ 24px along mat
let RB = 13; const RJ = 7;
const JACK_MASS = 0.22; // jack (~280g) is lighter than bowl (~1.3kg) — bowl continues forward, jack deflects
const MAX_SPD  = 8;

// ── Perspective projection ────────────────────────────────────────
// The mat renders as a trapezoid: wide at the near/delivery end, narrow at far end.
// P.nHW/fHW = near/far half-widths (screen px). P.gamma compresses far-end Y depth.
const P = { cx:220, nHW:240, fHW:90, nY:812, fY:80, gamma:1.5 };

// perspT: 0 = far end, 1 = near (delivery) end, from current deliverer's perspective
function matToPerspT(my) {
  return delivDir === 1
    ? (my - MAT.y) / MAT.h        // delivDir=1: bottom is near (t→1)
    : 1 - (my - MAT.y) / MAT.h;   // delivDir=-1: top is near (t→1)
}

// mat coords → screen coords
function m2s(mx, my) {
  const t  = matToPerspT(my);
  const tc = Math.max(0, Math.min(1, t));
  const hw = P.fHW + (P.nHW - P.fHW) * tc;
  const sx = P.cx + (mx - MAT.x - MAT.w / 2) * hw / (MAT.w / 2);
  const nY = delivDir === 1 ? P.nY : P.fY;
  const fY = delivDir === 1 ? P.fY : P.nY;
  const ts = Math.pow(Math.max(0, Math.min(1, t)), P.gamma);
  const sy = fY + (nY - fY) * ts;
  return { x: sx, y: sy };
}

// screen coords → mat coords (inverse perspective)
function s2m(sx, sy) {
  const nY = delivDir === 1 ? P.nY : P.fY;
  const fY = delivDir === 1 ? P.fY : P.nY;
  const ts = (sy - fY) / (nY - fY);
  if (ts < -0.05 || ts > 1.05) return null;
  const tc = Math.max(0, Math.min(1, ts));
  const t  = Math.pow(tc, 1 / P.gamma);
  const hw = P.fHW + (P.nHW - P.fHW) * t;
  const mx = MAT.x + MAT.w / 2 + (sx - P.cx) * (MAT.w / 2) / hw;
  const my = delivDir === 1 ? MAT.y + t * MAT.h : MAT.y + (1 - t) * MAT.h;
  return { x: mx, y: my };
}

// Scale a radius by perspective depth
function perspR(my, r) {
  const tc = Math.max(0, Math.min(1, matToPerspT(my)));
  const hw = P.fHW + (P.nHW - P.fHW) * tc;
  return Math.max(3.5, r * hw / (MAT.w / 2));
}
const FRICTION = 0.9955;
const BIAS_K   = 0.018;

const C = {
  bg:'#0a0f1e', mat:'#1a6b35', matAlt:'#1f7d3e', border:'#0a3d1c',
  board:'#f0ead8', boardShadow:'#c8b89a',
  line:'rgba(255,255,255,0.7)',
  fen:'#92400e', fenTop:'#d97706',
  jack:'#fef08a', jackS:'#ca8a04',
  p1:'#3b82f6', p1d:'#1d4ed8',
  p2:'#ef4444', p2d:'#b91c1c',
};

// ── Game state ────────────────────────────────────────────────────
let mode     = 'vs-ai';
let state    = 'idle';
let bgStyle  = 'hardwood';

const BOWL_COLOURS = [
  { name:'Blue',   main:'#3b82f6', dark:'#1d4ed8' },
  { name:'Red',    main:'#ef4444', dark:'#b91c1c' },
  { name:'Black',  main:'#6b7280', dark:'#374151' },
  { name:'Gold',   main:'#f59e0b', dark:'#92400e' },
  { name:'Green',  main:'#22c55e', dark:'#15803d' },
  { name:'White',  main:'#e2e8f0', dark:'#94a3b8' },
  { name:'Purple', main:'#a855f7', dark:'#6b21a8' },
  { name:'Orange', main:'#f97316', dark:'#c2410c' },
];

let splashCfg = { ends:6, mode:'vs-ai', size:3, biasVal:1.0, p1idx:0, p2idx:1, bg:'hardwood' };
let biasDir  = 'right';
let biasMult = 1.0;

let bowls    = [];
let jack     = null;
let scores   = [0, 0];
let endNum   = 1;
let jackOwner = 1;
let turnIdx   = 0;
let delivDir  = 1;   // 1 = bowl from bottom; -1 = from top
let aiTimer   = null;
let jackOffCounts  = [0, 0]; // per-player count of knocking jack off the side (resets each game)
let lastJackHitter = null;   // player who last struck the jack

let mouse    = { x: 0, y: 0, down: false };
let aimActive = false;

// ── Swipe control state ───────────────────────────────────────────
let aimAngle     = null;   // null = recalculate default toward jack
let aimBaseAngle = 0;      // aimAngle when current drag started
let aimDragStartX = 0;
let swipeSamples = [];     // [{x,y,t}] recent pointer positions
let aimLiveSpeed = 0;      // upward px/s during active swipe (for power ring)

const MIN_SWIPE_SPEED = 200;  // px/s minimum to count as a deliver
const MAX_SWIPE_SPEED = 2200; // px/s = full power

function defaultAimAngle() {
  const bs = bowlStart();
  if (jack && !jack.offMat) return Math.atan2(jack.y - bs.y, jack.x - bs.x);
  return delivDir === 1 ? -Math.PI / 2 : Math.PI / 2;
}

function calcSwipeVelocity() {
  if (swipeSamples.length < 2) return { vx: 0, vy: 0 };
  const last = swipeSamples[swipeSamples.length - 1];
  const recent = swipeSamples.filter(s => last.t - s.t <= 100);
  if (recent.length < 2) return { vx: 0, vy: 0 };
  const dt = (recent[recent.length-1].t - recent[0].t) / 1000;
  if (dt <= 0) return { vx: 0, vy: 0 };
  return {
    vx: (recent[recent.length-1].x - recent[0].x) / dt,
    vy: (recent[recent.length-1].y - recent[0].y) / dt,
  };
}

function resetAim() { aimAngle = null; swipeSamples = []; aimLiveSpeed = 0; }

// ── Position helpers ──────────────────────────────────────────────
// All helpers respect the current delivDir (1=bowl from bottom, -1=from top)

// Fraction helpers: "fromNear" = fraction from the near/delivery end
function yFromNear(frac) {
  return delivDir === 1
    ? MAT.y + MAT.h * (1 - frac)   // near end is bottom
    : MAT.y + MAT.h * frac;         // near end is top
}
function yFromFar(frac) {
  return delivDir === 1
    ? MAT.y + MAT.h * frac          // far end is top
    : MAT.y + MAT.h * (1 - frac);  // far end is bottom
}

function bowlStart() {
  // Bowl delivered from the ditch line (player stands on delivery mat just inside fender)
  return { x: MAT.x + MAT.w / 2, y: yFromNear(L.DITCH) };
}

// Jack y-range on the far jack line (jack line runs along the mat = vertical on screen)
function jackYMin() { return yFromFar(L.JACK_N); } // closer to far fender (screen: smaller y when delivDir=1)
function jackYMax() { return yFromFar(L.JACK_F); } // farther from far fender
function jackLineX() { return MAT.x + MAT.w / 2; } // always centre-x

// Dead zone: between near fender and ditch line
function nearDitchY()  { return yFromNear(L.DITCH); }
// Dead line: bowl must travel past this to count
function nearDeadY()   { return yFromNear(L.DEAD); }

// Bowl ended in ditch zone (too close to near fender)?
function isInNearDitchZone(b) {
  return delivDir === 1 ? b.y > nearDitchY() : b.y < nearDitchY();
}
// Bowl didn't reach minimum distance (dead line)?
function isShortBowl(b) {
  const dy = nearDeadY();
  return delivDir === 1 ? b.y > dy : b.y < dy;
}

// Clamp a y to the jack line range (jack line is vertical, x=centre)
function clampToJackLine(y) {
  const lo = Math.min(jackYMin(), jackYMax());
  const hi = Math.max(jackYMin(), jackYMax());
  return Math.max(lo, Math.min(hi, y));
}

function playerForTurn(t) {
  const other = jackOwner === 1 ? 2 : 1;
  return t % 2 === 0 ? jackOwner : other;
}

function allStopped() {
  if (jack && !jack.stopped && !jack.offMat && !jack.offSide) return false;
  return bowls.every(b => b.stopped || b.offMat);
}

function msg(html) { document.getElementById('msgBox').innerHTML = html; }
function updateHUD() {
  document.getElementById('sc1').textContent = scores[0];
  document.getElementById('sc2').textContent = scores[1];
}

// ── Physics ───────────────────────────────────────────────────────
function applyBias(obj, bias) {
  const spd = Math.hypot(obj.vx, obj.vy);
  if (spd < 0.01) return;
  // Only bias when travelling toward the far end — not on rebound or backward roll
  const movingForward = delivDir === 1 ? obj.vy < 0 : obj.vy > 0;
  if (!movingForward) return;
  const nx = obj.vx/spd, ny = obj.vy/spd;
  const sign = bias === 'right' ? 1 : -1;
  obj.vx += -ny * sign * BIAS_K * biasMult * spd;
  obj.vy +=  nx * sign * BIAS_K * biasMult * spd;
}

function stepObj(obj, bias) {
  if (obj.stopped || obj.offMat) return;

  const spd = Math.hypot(obj.vx, obj.vy);
  if (spd < 0.22) {
    obj.stopped = true; obj.vx = obj.vy = 0;
    const farDitchY = yFromFar(L.DITCH);
    const inFarDitch = delivDir === 1 ? obj.y < farDitchY : obj.y > farDitchY;
    if (obj === jack) {
      if (inFarDitch) { obj.inDitch = true; msg('Jack in the ditch! Only touchers count.'); }
    } else {
      const overshot = inFarDitch;
      if (isInNearDitchZone(obj) || isShortBowl(obj)) {
        obj.offMat = true;
      } else if (overshot) {
        if (obj.toucher) obj.inDitch = true;
        else obj.offMat = true;
      }
    }
    return;
  }

  if (bias) applyBias(obj, bias);
  obj.vx *= FRICTION; obj.vy *= FRICTION;
  obj.x  += obj.vx;  obj.y  += obj.vy;

  const r = obj === jack ? RJ : RB;

  // Side walls
  if (obj.x - r < MAT.x || obj.x + r > MAT.x + MAT.w) {
    if (obj === jack) {
      // Jack off the side — clamp visually, mark as offSide for end restart logic
      obj.x = Math.max(MAT.x + r, Math.min(MAT.x + MAT.w - r, obj.x));
      obj.vx = obj.vy = 0; obj.stopped = true; obj.offSide = true;
    } else {
      obj.offMat = true; obj.stopped = true;
    }
    return;
  }

  // End boards — jack and touchers clamp to fender; other bowls die
  if (obj.y - r < MAT.y || obj.y + r > MAT.y + MAT.h) {
    obj.y = obj.y - r < MAT.y ? MAT.y + r : MAT.y + MAT.h - r;
    obj.vx = obj.vy = 0; obj.stopped = true;
    if (obj === jack) {
      obj.inDitch = true;
      msg('Jack in the ditch! Only touchers count.');
    } else if (obj.toucher) {
      obj.inDitch = true;
    } else {
      obj.offMat = true;
    }
    return;
  }

  // Centre block — hitting the block kills the bowl / jack
  const fx1 = FENDER.x, fx2 = FENDER.x + FENDER.w;
  const fy1 = FENDER.y, fy2 = FENDER.y + FENDER.h;
  if (obj.x - r < fx2 && obj.x + r > fx1 && obj.y - r < fy2 && obj.y + r > fy1) {
    obj.offMat = true; obj.stopped = true;
    // Small visual nudge so dead bowl doesn't overlap the block
    if (obj.y < fy1 + FH/2) obj.y = fy1 - r - 2;
    else                     obj.y = fy2 + r + 2;
  }
}

function stepCollisions() {
  for (let i = 0; i < bowls.length; i++) {
    const a = bowls[i];
    if (a.offMat) continue;
    for (let j = i+1; j < bowls.length; j++) {
      const b = bowls[j];
      if (b.offMat) continue;
      collide(a, b, RB, RB, 0.75);
    }
    if (jack && !jack.offMat && !jack.offSide) {
      const jvxBefore = jack.vx, jvyBefore = jack.vy;
      collide(a, jack, RB, RJ, 0.85, 1, JACK_MASS);
      if (jack.vx !== jvxBefore || jack.vy !== jvyBefore) {
        lastJackHitter = a.player;
        a.toucher = true;
      }
    }
  }
}

// ma/mb are relative masses (bowl=1, jack=JACK_MASS)
function collide(a, b, ra, rb, rest, ma=1, mb=1) {
  const dx = b.x-a.x, dy = b.y-a.y;
  const dist = Math.hypot(dx, dy);
  const minD = ra + rb;
  if (dist >= minD || dist < 0.01) return;
  const nx = dx/dist, ny = dy/dist;
  const rel = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
  if (rel > 0) {
    const imp = 2 * rel * rest / (1/ma + 1/mb);
    a.vx -= imp/ma*nx; a.vy -= imp/ma*ny;
    b.vx += imp/mb*nx; b.vy += imp/mb*ny;
    a.stopped = false; b.stopped = false;
  }
  // Mass-weighted separation so heavier object barely budges
  const ov = minD - dist;
  a.x -= nx * ov * mb/(ma+mb);
  a.y -= ny * ov * mb/(ma+mb);
  b.x += nx * ov * ma/(ma+mb);
  b.y += ny * ov * ma/(ma+mb);
}

// ── Trajectory simulation (preview & AI) ─────────────────────────
function simPath(sx, sy, angle, speed, bias, bMult) {
  let x = sx, y = sy;
  let vx = Math.cos(angle)*speed, vy = Math.sin(angle)*speed;
  const path = [{x, y}];

  for (let i = 0; i < 1500; i++) {
    const spd = Math.hypot(vx, vy);
    if (spd < 0.22) break;
    const nx = vx/spd, ny = vy/spd;
    const movingForward = delivDir === 1 ? vy < 0 : vy > 0;
    if (movingForward && bias) {
      const sign = bias === 'right' ? 1 : -1;
      vx += -ny * sign * BIAS_K * bMult * spd;
      vy +=  nx * sign * BIAS_K * bMult * spd;
    }
    vx *= FRICTION; vy *= FRICTION;
    x += vx; y += vy;
    if (x < MAT.x || x > MAT.x+MAT.w || y < MAT.y || y > MAT.y+MAT.h) break;
    if (x-RB < FENDER.x+FENDER.w && x+RB > FENDER.x &&
        y-RB < FENDER.y+FENDER.h && y+RB > FENDER.y) { path.push({x,y}); break; }
    path.push({x, y});
  }
  return path;
}

// ── AI ────────────────────────────────────────────────────────────
function aiPickShot() {
  if (!jack || jack.offMat) return null;
  const bs  = bowlStart();
  const jx  = jack.x, jy = jack.y;
  const base = Math.atan2(jy - bs.y, jx - bs.x);

  let bestAngle = base, bestPower = 0.6*MAX_SPD, bestDist = Infinity;

  for (let da = -55; da <= 55; da += 2.5) {
    const angle = base + da * Math.PI/180;
    for (const pct of [0.38, 0.50, 0.62, 0.74, 0.86]) {
      const spd = pct * MAX_SPD;
      const path = simPath(bs.x, bs.y, angle, spd, biasDir, biasMult);
      const end  = path[path.length-1];
      const d    = Math.hypot(end.x - jx, end.y - jy);
      if (d < bestDist) { bestDist = d; bestAngle = angle; bestPower = spd; }
    }
  }

  return {
    angle: bestAngle + (Math.random()-0.5)*0.16,
    speed: bestPower * (0.93 + Math.random()*0.14)
  };
}

// ── Scoring ───────────────────────────────────────────────────────
function scoreEnd() {
  if (!jack || jack.offMat) return null;
  const dists = bowls
    .filter(b => !b.offMat)
    .map(b => ({ p: b.player, d: Math.hypot(b.x-jack.x, b.y-jack.y) }))
    .sort((a,b) => a.d - b.d);
  if (!dists.length) return null;
  const winner = dists[0].p;
  let pts = 0;
  for (const e of dists) { if (e.p === winner) pts++; else break; }
  return { winner, pts };
}

// ── Game flow ─────────────────────────────────────────────────────
function startGame() {
  clearTimeout(aiTimer);
  bowls=[]; jack=null; scores=[0,0]; endNum=1;
  jackOwner=1; turnIdx=0; delivDir=1;
  jackOffCounts=[0,0]; lastJackHitter=null;
  resetCam(); resetAim(); updateHUD(); startEnd();
}

function startEnd() {
  bowls=[]; jack=null; turnIdx=0; lastJackHitter=null;
  resetCam(); resetAim();
  state='place-jack';
  if (jackOwner === 2 && mode === 'vs-ai') {
    aiPlaceJack();
  } else {
    const who = jackOwner===1
      ? '<span style="color:#60a5fa">Player 1</span>'
      : '<span style="color:#f87171">Player 2</span>';
    msg(`End ${endNum}/${ENDS} — ${who}: click along the glowing jack line (far end) to place the jack`);
  }
}

function aiPlaceJack() {
  // Jack line is vertical at centre-x; vary y within the jack line range
  const lo = Math.min(jackYMin(), jackYMax());
  const hi = Math.max(jackYMin(), jackYMax());
  jack = {
    x: jackLineX(),
    y: lo + Math.random() * (hi - lo),
    vx:0, vy:0, stopped:true, offMat:false
  };
  beginTurns();
}

function beginTurns() { promptPlayer(playerForTurn(turnIdx)); }

function promptPlayer(p) {
  if (p === 2 && mode === 'vs-ai') {
    state = 'ai-turn';
    msg(`End ${endNum}/${ENDS} — <span style="color:#f87171">AI</span> is aiming…`);
    aiTimer = setTimeout(() => {
      if (state !== 'ai-turn') return;
      const shot = aiPickShot();
      if (!shot) return;
      deliverBowl(p, shot.angle, shot.speed);
    }, 1100);
  } else {
    state = 'aim';
    const col  = p===1 ? '#60a5fa' : '#f87171';
    const name = p===1 ? 'Player 1' : 'Player 2';
    msg(`End ${endNum}/${ENDS} — <span style="color:${col}">${name}</span>: drag from the delivery mark`);
  }
}

function deliverBowl(player, angle, speed) {
  const bs = bowlStart();
  bowls.push({x:bs.x, y:bs.y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
              player, bias:biasDir, stopped:false, offMat:false, toucher:false, inDitch:false});
  state = 'moving';
  cam.phase = 'tracking';
  cam.pendingNext = false;
}

const BPP = 4; let ENDS = 6;

// ── Camera follow ─────────────────────────────────────────────────
let cam = {
  phase: 'idle',   // 'idle' | 'tracking' | 'hold' | 'return'
  x: W/2, y: H/2,
  zoom: 1,
  tx: W/2, ty: H/2,
  tz: 1,
  holdFrames: 0,
  pendingNext: false
};

function resetCam() {
  cam.phase = 'idle';
  cam.x = W/2; cam.y = H/2; cam.zoom = 1;
  cam.tx = W/2; cam.ty = H/2; cam.tz = 1;
  cam.holdFrames = 0; cam.pendingNext = false;
}

function updateCamera() {
  const lerp = (a, b, t) => a + (b - a) * t;

  if (cam.phase === 'tracking') {
    // Find the moving bowl (most recently delivered)
    const moving = [...bowls].reverse().find(b => !b.stopped && !b.offMat);
    if (moving) {
      const s = m2s(moving.x, moving.y);
      // Target: centre camera on bowl with look-ahead toward far end
      const lookAhead = -60; // pixels toward far end (up the screen)
      cam.tx = s.x;
      cam.ty = s.y + lookAhead;
      // Zoom in as bowl travels further from delivery end
      const progress = 1 - (moving.y - MAT.y) / MAT.h; // 0 at near, 1 at far
      cam.tz = 1 + progress * 0.8; // up to 1.8x zoom
    } else {
      // Bowl stopped — transition to hold
      cam.phase = 'hold';
      cam.holdFrames = 100;
      if (jack && !jack.offMat) {
        const js = m2s(jack.x, jack.y);
        cam.tx = js.x; cam.ty = js.y;
      }
      cam.tz = 1.6;
    }
    cam.x = lerp(cam.x, cam.tx, 0.08);
    cam.y = lerp(cam.y, cam.ty, 0.08);
    cam.zoom = lerp(cam.zoom, cam.tz, 0.06);

  } else if (cam.phase === 'hold') {
    cam.x = lerp(cam.x, cam.tx, 0.1);
    cam.y = lerp(cam.y, cam.ty, 0.1);
    cam.zoom = lerp(cam.zoom, cam.tz, 0.08);
    cam.holdFrames--;
    if (cam.holdFrames <= 0) {
      cam.phase = 'return';
      cam.tx = W/2; cam.ty = H/2; cam.tz = 1;
    }

  } else if (cam.phase === 'return') {
    cam.x = lerp(cam.x, W/2, 0.07);
    cam.y = lerp(cam.y, H/2, 0.07);
    cam.zoom = lerp(cam.zoom, 1, 0.07);
    const settled = Math.abs(cam.zoom - 1) < 0.01 &&
                    Math.abs(cam.x - W/2) < 2 &&
                    Math.abs(cam.y - H/2) < 2;
    if (settled) {
      cam.x = W/2; cam.y = H/2; cam.zoom = 1;
      cam.phase = 'idle';
      if (cam.pendingNext) {
        cam.pendingNext = false;
        _doOnAllStopped();
      }
    }
  }
}

function applyCameraTransform() {
  if (cam.phase === 'idle') return;
  ctx.translate(W/2, H/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);
}

function _doOnAllStopped() {
  turnIdx++;
  if (turnIdx >= BPP * 2) { finishEnd(); return; }
  promptPlayer(playerForTurn(turnIdx));
}

function onAllStopped() {
  if (jack && jack.offSide) { handleJackOffSide(); return; }
  // Trigger hold + return before next turn
  if (cam.phase === 'tracking' || cam.phase === 'hold') {
    cam.phase = 'hold';
    cam.holdFrames = 100;
    if (jack && !jack.offMat) {
      const js = m2s(jack.x, jack.y);
      cam.tx = js.x; cam.ty = js.y;
    }
    cam.tz = 1.6;
    cam.pendingNext = true;
    state = 'camera-return';
    return;
  }
  _doOnAllStopped();
}

function handleJackOffSide() {
  const hitter = lastJackHitter ?? playerForTurn(Math.max(0, turnIdx));
  const idx = hitter - 1;
  jackOffCounts[idx]++;
  const hCol  = hitter === 1 ? '#60a5fa' : '#f87171';
  const hName = hitter === 1 ? 'Player 1' : (mode === 'vs-ai' ? 'AI' : 'Player 2');
  if (jackOffCounts[idx] >= 3) {
    const opp = hitter === 1 ? 2 : 1;
    scores[opp - 1] += 3;
    jackOwner = opp;
    updateHUD();
    const oCol  = opp === 1 ? '#60a5fa' : '#f87171';
    const oName = opp === 1 ? 'Player 1' : (mode === 'vs-ai' ? 'AI' : 'Player 2');
    state = 'end-result';
    msg(`End ${endNum} — <span style="color:${hCol}">${hName}</span> knocked the jack off the side for the 3rd time! <span style="color:${oCol}">${oName}</span> wins 3 points. Click to continue.`);
  } else {
    const rem = 3 - jackOffCounts[idx];
    state = 'jack-off-side';
    msg(`End ${endNum} — Jack knocked off the side by <span style="color:${hCol}">${hName}</span> (warning ${jackOffCounts[idx]}/3 — ${rem} left). End restarted. Click to continue.`);
  }
}

function finishEnd() {
  state = 'end-result';
  const res = scoreEnd();
  if (res) {
    scores[res.winner-1] += res.pts;
    updateHUD();
    const col  = res.winner===1 ? '#60a5fa' : '#f87171';
    const name = res.winner===1 ? 'Player 1' : (mode==='vs-ai' ? 'AI' : 'Player 2');
    msg(`End ${endNum} — <span style="color:${col}">${name}</span> scores ${res.pts} point${res.pts!==1?'s':''}! Click to continue.`);
    jackOwner = res.winner;
  } else {
    msg(`End ${endNum} — Dead end (no jack in play). Click to continue.`);
  }
}

function advanceEnd() {
  endNum++;
  if (endNum > ENDS) { gameOver(); return; }
  startEnd();
}

function gameOver() {
  state = 'game-over';
  const n2 = mode==='vs-ai' ? 'AI' : 'Player 2';
  let res;
  if (scores[0]>scores[1])      res=`<span style="color:#60a5fa">Player 1 wins</span> ${scores[0]}–${scores[1]}`;
  else if (scores[1]>scores[0]) res=`<span style="color:#f87171">${n2} wins</span> ${scores[1]}–${scores[0]}`;
  else                          res=`Draw! ${scores[0]}–${scores[1]}`;
  msg(`Game over — ${res}. Press New Game to play again.`);
}

// ── Drawing ───────────────────────────────────────────────────────
function drawFloor() {
  if (bgStyle === 'hardwood') {
    const plankH = 42, cols = ['#8B5C20','#7A5018','#96622A','#8A5A1E'];
    for (let y = 0; y < H; y += plankH) {
      ctx.fillStyle = cols[Math.floor(y/plankH) % cols.length];
      ctx.fillRect(0, y, W, plankH);
      ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
      for (let g = 6; g < plankH; g += 10) {
        ctx.beginPath(); ctx.moveTo(0,y+g); ctx.lineTo(W,y+g); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
  } else {
    const CC = {
      'green-carpet':  ['#1a5c2a','#1d6430'],
      'blue-carpet':   ['#12305e','#163568'],
      'red-carpet':    ['#5c1414','#681818'],
    };
    const [c1, c2] = CC[bgStyle] || CC['green-carpet'];
    for (let y = 0; y < H; y += 18) {
      ctx.fillStyle = Math.floor(y/18)%2===0 ? c1 : c2;
      ctx.fillRect(0, y, W, 18);
    }
    // Diagonal pile sheen
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
    for (let x = -H; x < W+H; x += 9) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+H,H); ctx.stroke();
    }
  }
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.rect(50, 0, W - 100, H); ctx.clip();
  applyCameraTransform();
  drawFloor();
  drawMat();
  if (jack && !jack.offMat) drawJack();
  for (const b of bowls) drawBowl(b);
  if (state==='aim') drawAim();
  ctx.restore();
  drawSidePanels();
}

function drawMat() {
  ctx.save();
  const cx = MAT.x + MAT.w / 2;

  // Helpers — project mat-space geometry to screen
  function fillStrip(my1, my2, color) {
    const tl=m2s(MAT.x,my1), tr=m2s(MAT.x+MAT.w,my1);
    const br=m2s(MAT.x+MAT.w,my2), bl=m2s(MAT.x,my2);
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath(); ctx.fill();
  }
  function hLineM(my, color, width, dash=[]) {
    const l=m2s(MAT.x,my), r=m2s(MAT.x+MAT.w,my);
    ctx.strokeStyle=color; ctx.lineWidth=width; ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(r.x,r.y); ctx.stroke();
    ctx.setLineDash([]);
  }
  function vLineM(mx, my1, my2, color, width) {
    const a=m2s(mx,my1), b=m2s(mx,my2);
    ctx.strokeStyle=color; ctx.lineWidth=width;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  function labelM(text, mx, my, dx, dy, color, size=8) {
    const p=m2s(mx,my);
    ctx.fillStyle=color; ctx.font=`${size}px Segoe UI`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(text, p.x+dx, p.y+dy); ctx.textBaseline='alphabetic';
  }

  // ── Alternating green stripes (trapezoid quads) ─────────────────
  for (let i=0; i<MAT.h; i+=50) {
    fillStrip(MAT.y+i, MAT.y+Math.min(i+50,MAT.h),
              Math.floor(i/50)%2===0 ? C.mat : C.matAlt);
  }

  // ── Wood Fenders — staple/U-shape: back board + two arms to ditch line ──
  // Fender + ditch line form a complete rectangle enclosing the ditch area
  const tDitch_f = MAT.y + L.DITCH * MAT.h;
  const bDitch_f = MAT.y + (1 - L.DITCH) * MAT.h;

  function drawFenderBoard(L4, R4, above) {
    const fw = R4.x - L4.x;
    const bh = 11;
    const fy = above ? L4.y - bh : L4.y;
    const FEND_COL  = '#eeece4';
    const FEND_DARK = 'rgba(100,90,70,0.6)';

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(L4.x + 2, fy + 2, fw, bh);

    const grad = ctx.createLinearGradient(0, fy, 0, fy + bh);
    grad.addColorStop(0,   '#f0ece2'); grad.addColorStop(1, '#d8d4ca');
    ctx.fillStyle = grad;
    ctx.fillRect(L4.x, fy, fw, bh);

    ctx.strokeStyle = 'rgba(160,150,130,0.2)'; ctx.lineWidth = 1;
    for (let gx = L4.x + 12; gx < R4.x - 4; gx += 16) {
      ctx.beginPath(); ctx.moveTo(gx, fy + 2); ctx.lineTo(gx, fy + bh - 2); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(L4.x, fy, fw, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';       ctx.fillRect(L4.x, fy + bh - 2, fw, 2);
    ctx.strokeStyle = FEND_DARK; ctx.lineWidth = 1.5;
    ctx.strokeRect(L4.x, fy, fw, bh);
  }

  function drawFenderArm(mx, matY, deadY, above) {
    const top    = m2s(mx - 4, Math.min(matY, deadY));
    const bottom = m2s(mx + 4, Math.max(matY, deadY));
    // Draw as a projected quad following perspective
    const tl = m2s(mx - 4, Math.min(matY, deadY));
    const tr = m2s(mx + 4, Math.min(matY, deadY));
    const br = m2s(mx + 4, Math.max(matY, deadY));
    const bl = m2s(mx - 4, Math.max(matY, deadY));

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.moveTo(tl.x+2,tl.y+2); ctx.lineTo(tr.x+2,tr.y+2);
    ctx.lineTo(br.x+2,br.y+2); ctx.lineTo(bl.x+2,bl.y+2); ctx.closePath(); ctx.fill();

    const grad = ctx.createLinearGradient(tl.x, 0, tr.x, 0);
    grad.addColorStop(0, '#d8d4ca'); grad.addColorStop(0.5, '#f0ece2'); grad.addColorStop(1, '#d8d4ca');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath(); ctx.fill();

    ctx.strokeStyle = 'rgba(100,90,70,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath(); ctx.stroke();
  }

  // Far fender (top) — back board above MAT.y, arms down to far ditch line
  {
    const L4 = m2s(MAT.x - 8, MAT.y), R4 = m2s(MAT.x + MAT.w + 8, MAT.y);
    drawFenderArm(MAT.x - 4, MAT.y, tDitch_f, true);
    drawFenderArm(MAT.x + MAT.w + 4, MAT.y, tDitch_f, true);
    drawFenderBoard(L4, R4, true);
  }
  // Near fender (bottom) — back board below MAT.y+MAT.h, arms up to near ditch line
  {
    const L4 = m2s(MAT.x - 8, MAT.y + MAT.h), R4 = m2s(MAT.x + MAT.w + 8, MAT.y + MAT.h);
    drawFenderArm(MAT.x - 4, MAT.y + MAT.h, bDitch_f, false);
    drawFenderArm(MAT.x + MAT.w + 4, MAT.y + MAT.h, bDitch_f, false);
    drawFenderBoard(L4, R4, false);
  }

  // ── Mat border (projected trapezoid outline) ────────────────────
  const mc=[m2s(MAT.x,MAT.y), m2s(MAT.x+MAT.w,MAT.y),
            m2s(MAT.x+MAT.w,MAT.y+MAT.h), m2s(MAT.x,MAT.y+MAT.h)];
  ctx.strokeStyle=C.border; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(mc[0].x,mc[0].y);
  for (const c of mc.slice(1)) ctx.lineTo(c.x,c.y);
  ctx.closePath(); ctx.stroke();

  // ── ESMBA mat markings ──────────────────────────────────────────
  const tDitch=MAT.y+L.DITCH*MAT.h,  tDead=MAT.y+L.DEAD*MAT.h;
  const tJackN=MAT.y+L.JACK_N*MAT.h, tJackF=MAT.y+L.JACK_F*MAT.h;
  const tMatE =MAT.y+L.MAT_LEN*MAT.h;
  const bDitch=MAT.y+(1-L.DITCH)*MAT.h,  bDead=MAT.y+(1-L.DEAD)*MAT.h;
  const bJackN=MAT.y+(1-L.JACK_N)*MAT.h, bJackF=MAT.y+(1-L.JACK_F)*MAT.h;
  const bMatE =MAT.y+(1-L.MAT_LEN)*MAT.h;

  // Ditch zones — same green baize as the mat, very slightly darker to hint at the zone
  fillStrip(MAT.y,  tDitch, 'rgba(0,0,0,0.10)');
  fillStrip(bDitch, MAT.y+MAT.h, 'rgba(0,0,0,0.10)');

  // Ditch lines
  hLineM(tDitch, C.line, 1.5);
  labelM('DITCH', MAT.x+4, tDitch, 0, -6, 'rgba(255,255,255,0.4)');
  hLineM(bDitch, C.line, 1.5);
  labelM('DITCH', MAT.x+4, bDitch, 0, -6, 'rgba(255,255,255,0.4)');

  // Dead lines
  hLineM(tDead, 'rgba(255,255,255,0.6)', 2);
  labelM('DEAD LINE', MAT.x+MAT.w, tDead, -58, -6, 'rgba(255,255,255,0.5)');
  hLineM(bDead, 'rgba(255,255,255,0.6)', 2);
  labelM('DEAD LINE', MAT.x+MAT.w, bDead, -58, -6, 'rgba(255,255,255,0.5)');

  // Delivery bracket lines — ±54px from centre, from ditch toward centre
  const delivLen=L.DELIV_LEN*MAT.h;
  [[tDitch, tDitch+delivLen], [bDitch, bDitch-delivLen]].forEach(([dy, dy2]) => {
    vLineM(cx-54, dy, dy2, 'rgba(255,255,255,0.5)', 1.5);
    vLineM(cx+54, dy, dy2, 'rgba(255,255,255,0.5)', 1.5);
  });

  // Jack lines — vertical at centre-x, serifs, label on active end
  [[tJackF, tJackN, true], [bJackN, bJackF, false]].forEach(([y1, y2, isTopSet]) => {
    const isFarEnd = delivDir===1 ? isTopSet : !isTopSet;
    const col = isFarEnd ? 'rgba(255,220,50,0.85)' : 'rgba(255,220,50,0.3)';
    vLineM(cx, y1, y2, col, isFarEnd?2:1.5);
    const sa=m2s(cx,y1), sb=m2s(cx,y2);
    const sw=isFarEnd?12:8;
    ctx.strokeStyle=col; ctx.lineWidth=isFarEnd?1.5:1;
    ctx.beginPath(); ctx.moveTo(sa.x-sw/2,sa.y); ctx.lineTo(sa.x+sw/2,sa.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sb.x-sw/2,sb.y); ctx.lineTo(sb.x+sw/2,sb.y); ctx.stroke();
    if (isFarEnd) labelM('JACK', cx+14, (y1+y2)/2, 0, 0, 'rgba(255,220,50,0.6)');
  });

  // Glow on active jack line when placing
  if (state==='place-jack') {
    const lo=Math.min(jackYMin(),jackYMax()), hi=Math.max(jackYMin(),jackYMax());
    vLineM(cx, lo, hi, 'rgba(255,220,50,0.5)', 4);
  }

  // Delivery mat — black with wide gray border, near (delivery) end only
  const [dmY1, dmY2] = delivDir === 1 ? [bMatE, MAT.y+MAT.h] : [MAT.y, tMatE];
  {
    const my1=Math.min(dmY1,dmY2), my2=Math.max(dmY1,dmY2);
    const mw=Math.round(356/1830*MAT.w);
    // Border is 30% of mat width each side; inner black area = 40% of width
    const brdX = mw * 0.30;
    const matH = my2 - my1;
    const brdY = matH * 0.18;
    // Outer gray fill
    const tl=m2s(cx-mw/2,my1), tr=m2s(cx+mw/2,my1);
    const br=m2s(cx+mw/2,my2), bl=m2s(cx-mw/2,my2);
    ctx.fillStyle='rgba(150,150,150,0.90)';
    ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath(); ctx.fill();
    // Inner black surface
    const itl=m2s(cx-mw/2+brdX,my1+brdY), itr=m2s(cx+mw/2-brdX,my1+brdY);
    const ibr=m2s(cx+mw/2-brdX,my2-brdY), ibl=m2s(cx-mw/2+brdX,my2-brdY);
    ctx.fillStyle='rgba(20,20,20,0.95)';
    ctx.beginPath(); ctx.moveTo(itl.x,itl.y); ctx.lineTo(itr.x,itr.y);
    ctx.lineTo(ibr.x,ibr.y); ctx.lineTo(ibl.x,ibl.y); ctx.closePath(); ctx.fill();
  }

  // Centre block (projected quad)
  const bx1=cx-FW/2, bx2=cx+FW/2;
  const by1=FENDER.y, by2=FENDER.y+FENDER.h;
  const btl=m2s(bx1,by1), btr=m2s(bx2,by1);
  const bbr=m2s(bx2,by2), bbl=m2s(bx1,by2);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.moveTo(btl.x+2,btl.y+2); ctx.lineTo(btr.x+2,btr.y+2);
  ctx.lineTo(bbr.x+2,bbr.y+2); ctx.lineTo(bbl.x+2,bbl.y+2); ctx.closePath(); ctx.fill();
  ctx.fillStyle=C.fen;
  ctx.beginPath(); ctx.moveTo(btl.x,btl.y); ctx.lineTo(btr.x,btr.y);
  ctx.lineTo(bbr.x,bbr.y); ctx.lineTo(bbl.x,bbl.y); ctx.closePath(); ctx.fill();
  // Top-edge highlight strip
  const bth1=m2s(bx1,by1+5), bth2=m2s(bx2,by1+5);
  ctx.fillStyle=C.fenTop;
  ctx.beginPath(); ctx.moveTo(btl.x,btl.y); ctx.lineTo(btr.x,btr.y);
  ctx.lineTo(bth2.x,bth2.y); ctx.lineTo(bth1.x,bth1.y); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=C.fenTop; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(btl.x,btl.y); ctx.lineTo(btr.x,btr.y);
  ctx.lineTo(bbr.x,bbr.y); ctx.lineTo(bbl.x,bbl.y); ctx.closePath(); ctx.stroke();
  const bm=m2s(cx,(by1+by2)/2);
  ctx.fillStyle='#fde68a'; ctx.font='bold 7px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('BLOCK',bm.x,bm.y); ctx.textBaseline='alphabetic';

  // Gap hints either side of block
  const gY=FENDER.y+FENDER.h/2;
  const gL=m2s(MAT.x+4,gY), gBL=m2s(bx1-4,gY);
  const gBR=m2s(bx2+4,gY), gR=m2s(MAT.x+MAT.w-4,gY);
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(gL.x,gL.y); ctx.lineTo(gBL.x,gBL.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gBR.x,gBR.y); ctx.lineTo(gR.x,gR.y); ctx.stroke();
  ctx.setLineDash([]);

  // End counter above far board
  const topP=m2s(cx,MAT.y);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`End ${endNum} of ${ENDS}`, topP.x, topP.y-20);

  ctx.restore(); // end mat clip region
}

function drawJack() {
  const sp=m2s(jack.x,jack.y), r=perspR(jack.y,RJ);
  // Shadow
  ctx.beginPath(); ctx.arc(sp.x+1,sp.y+2,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fill();
  // Body — yellow sphere with radial gradient for depth
  const g=ctx.createRadialGradient(sp.x-r*0.35,sp.y-r*0.35,r*0.05,sp.x,sp.y,r);
  g.addColorStop(0,'#fef9c3'); g.addColorStop(0.5,'#fde047'); g.addColorStop(1,'#a16207');
  ctx.beginPath(); ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  // Rim
  ctx.strokeStyle='#92400e'; ctx.lineWidth=1; ctx.stroke();
  // Specular glint
  ctx.beginPath(); ctx.ellipse(sp.x-r*0.28,sp.y-r*0.3,r*0.22,r*0.14,-Math.PI/4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
}

function drawBowl(b) {
  if (b.offMat) return;
  const sp=m2s(b.x,b.y), r=perspR(b.y,RB);
  const pc=b.player===1?C.p1:C.p2;   // player colour for stickers
  // Biased bowls are slightly discoid — wider than they are tall in top-down perspective
  const rx=r*1.15, ry=r*0.88;

  // Drop shadow
  ctx.beginPath(); ctx.ellipse(sp.x+2,sp.y+3,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();

  // Main body — dark black like a real bias bowl
  const g=ctx.createRadialGradient(sp.x-r*0.25,sp.y-r*0.3,r*0.05,sp.x+r*0.1,sp.y+r*0.1,r*1.3);
  g.addColorStop(0,'#4a4a4a'); g.addColorStop(0.45,'#1c1c1c'); g.addColorStop(1,'#050505');
  ctx.beginPath(); ctx.ellipse(sp.x,sp.y,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();

  // Grip dimples — ring of small dots around the running-surface equator
  if (r>=6) {
    const nDots=Math.min(16,Math.max(6,Math.round(r*1.1)));
    const dr=Math.max(0.8,r*0.10);
    ctx.fillStyle='rgba(100,100,100,0.65)';
    for (let i=0;i<nDots;i++) {
      const a=i/nDots*Math.PI*2;
      ctx.beginPath();
      ctx.arc(sp.x+Math.cos(a)*rx*0.80, sp.y+Math.sin(a)*ry*0.80, dr, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Player-coloured sticker discs on each side face
  const sx=rx*0.52, sw=Math.max(2,r*0.28), sh=Math.max(1.5,r*0.22);
  // left sticker
  ctx.beginPath(); ctx.ellipse(sp.x-sx,sp.y,sw*0.55,sh,0,0,Math.PI*2);
  ctx.fillStyle=pc; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.5; ctx.stroke();
  // right sticker
  ctx.beginPath(); ctx.ellipse(sp.x+sx,sp.y,sw*0.55,sh,0,0,Math.PI*2);
  ctx.fillStyle=pc; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.5; ctx.stroke();

  // Specular highlight (top-left glint)
  ctx.beginPath();
  ctx.ellipse(sp.x-r*0.22,sp.y-r*0.28,r*0.28,r*0.16,-Math.PI/5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fill();

  // Bowl outline
  ctx.beginPath(); ctx.ellipse(sp.x,sp.y,rx,ry,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1; ctx.stroke();

  // Player number
  if (r>=7) {
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.font=`bold ${Math.max(6,Math.round(r*0.62))}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.player,sp.x,sp.y+0.5); ctx.textBaseline='alphabetic';
  }

  // Chalk mark for touchers
  if (b.toucher) {
    ctx.font = `bold ${Math.max(7,Math.round(r*0.7))}px Segoe UI`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('T', sp.x + rx + 5, sp.y - r*0.3);
    ctx.textBaseline = 'alphabetic';
  }
}

function drawAim() {
  const bsm = bowlStart(), bss = m2s(bsm.x, bsm.y);
  const angle = aimAngle ?? defaultAimAngle();

  // Use live swipe speed if player is actively swiping up, else show 60% preview
  const previewSpeed = aimLiveSpeed > 0
    ? Math.min(1, (aimLiveSpeed - MIN_SWIPE_SPEED) / (MAX_SWIPE_SPEED - MIN_SWIPE_SPEED)) * MAX_SPD
    : MAX_SPD * 0.6;
  const pct = previewSpeed / MAX_SPD;

  // Direction arrow — shaft + arrowhead projected into mat space
  const adx = Math.cos(angle), ady = Math.sin(angle);
  const tip = m2s(bsm.x + adx * 55, bsm.y + ady * 55);
  const mid = m2s(bsm.x + adx * 30, bsm.y + ady * 30);
  ctx.beginPath(); ctx.moveTo(bss.x, bss.y); ctx.lineTo(tip.x, tip.y);
  ctx.strokeStyle = 'rgba(255,230,50,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
  // Arrowhead
  const headAngle = Math.atan2(tip.y - mid.y, tip.x - mid.x);
  const hs = 10;
  ctx.beginPath();
  ctx.moveTo(tip.x, tip.y);
  ctx.lineTo(tip.x - hs * Math.cos(headAngle - 0.4), tip.y - hs * Math.sin(headAngle - 0.4));
  ctx.lineTo(tip.x - hs * Math.cos(headAngle + 0.4), tip.y - hs * Math.sin(headAngle + 0.4));
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,230,50,0.9)'; ctx.fill();

  // Power ring — only visible when swiping
  if (aimLiveSpeed > MIN_SWIPE_SPEED) {
    ctx.beginPath();
    ctx.arc(bss.x, bss.y, 28, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.strokeStyle = `hsl(${Math.round(120*(1-pct))},100%,55%)`;
    ctx.lineWidth = 5; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = 'bold 10px Segoe UI';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.round(pct*100)+'%', bss.x, bss.y); ctx.textBaseline = 'alphabetic';
  }

  // "Swipe up" hint when no swipe is in progress
  if (aimLiveSpeed === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('↑ swipe up to deliver', bss.x, bss.y + 48);
  }
}

function drawSidePanels() {
  const SP=50, SC=25; // panel width, panel centre x
  // Left — P1
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,SP,H);
  ctx.fillStyle=C.p1; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('P1',SC,50);
  for (let i=0;i<BPP;i++) {
    const bowled = bowls.filter(b=>b.player===1).length > i;
    ctx.beginPath(); ctx.arc(SC,66+i*28,9,0,Math.PI*2);
    ctx.globalAlpha = bowled ? 0.25 : 1;
    ctx.fillStyle = C.p1; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle=C.p1d; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Right — P2/AI
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(W-SP,0,SP,H);
  const lbl2 = mode==='vs-ai'?'AI':'P2';
  ctx.fillStyle=C.p2; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(lbl2,W-SC,50);
  for (let i=0;i<BPP;i++) {
    const bowled = bowls.filter(b=>b.player===2).length > i;
    ctx.beginPath(); ctx.arc(W-SC,66+i*28,9,0,Math.PI*2);
    ctx.globalAlpha = bowled ? 0.25 : 1;
    ctx.fillStyle = C.p2; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle=C.p2d; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Active player dot
  if (state==='aim'||state==='ai-turn') {
    const cur=playerForTurn(turnIdx);
    const ax=cur===1?SC:W-SC;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath(); ctx.arc(ax,45,6,0,Math.PI*2); ctx.fill();
  }

  // Distance lines + leader star
  if (jack && !jack.offMat && bowls.some(b=>!b.offMat)) drawDistances();
}

function drawDistances() {
  const dists = bowls.filter(b => !b.offMat)
    .map(b=>({b,d:Math.hypot(b.x-jack.x,b.y-jack.y)}))
    .sort((a,b)=>a.d-b.d);
  const js=m2s(jack.x,jack.y);
  for (const e of dists.slice(0,6)) {
    const bs=m2s(e.b.x,e.b.y);
    ctx.beginPath(); ctx.moveTo(bs.x,bs.y); ctx.lineTo(js.x,js.y);
    ctx.strokeStyle=e.b.player===1?'rgba(96,165,250,0.22)':'rgba(248,113,113,0.22)';
    ctx.lineWidth=1; ctx.stroke();
  }
  if (dists.length) {
    const lb=dists[0].b, lbs=m2s(lb.x,lb.y), lr=perspR(lb.y,RB);
    ctx.fillStyle='#fbbf24'; ctx.font='12px serif';
    ctx.textAlign='center'; ctx.fillText('★',lbs.x,lbs.y-lr-4);
  }
}

// ── Main loop ─────────────────────────────────────────────────────
function loop() {
  if (state==='moving') {
    for (const b of bowls) stepObj(b, b.bias);
    stepObj(jack, null);
    stepCollisions();
    if (allStopped()) onAllStopped();
  }
  if (state==='moving' || state==='camera-return') {
    updateCamera();
  }
  draw();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────
function getPos(e) {
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left)*sx, y:(cy-r.top)*sy};
}

function handlePointerDown(p) {
  mouse = { x: p.x, y: p.y, down: true };

  if (state === 'place-jack') {
    const mm = s2m(p.x, p.y);
    if (mm) {
      const jx = jackLineX();
      const lo = Math.min(jackYMin(), jackYMax()), hi = Math.max(jackYMin(), jackYMax());
      if (Math.abs(mm.x - jx) < MAT.w * 0.3 && mm.y >= lo - 20 && mm.y <= hi + 20) {
        const jy = Math.max(lo, Math.min(hi, mm.y));
        jack = { x: jx, y: jy, vx: 0, vy: 0, stopped: true, offMat: false, inDitch: false };
        beginTurns();
      } else {
        msg('Click along the glowing jack line (the vertical mark at the centre of the far end)!');
      }
    }
  } else if (state === 'aim') {
    // Begin gesture — could be direction-setting or power swipe
    if (aimAngle === null) aimAngle = defaultAimAngle();
    aimBaseAngle  = aimAngle;
    aimDragStartX = p.x;
    swipeSamples  = [{ x: p.x, y: p.y, t: Date.now() }];
    aimLiveSpeed  = 0;
  } else if (state === 'end-result') {
    advanceEnd();
  } else if (state === 'jack-off-side') {
    startEnd();
  }
}

function handlePointerMove(p) {
  mouse.x = p.x; mouse.y = p.y;
  if (state !== 'aim' || !mouse.down) return;

  swipeSamples.push({ x: p.x, y: p.y, t: Date.now() });
  if (swipeSamples.length > 40) swipeSamples.shift();

  const vel = calcSwipeVelocity();
  const upSpeed = -vel.vy; // negative screen-y = moving up
  aimLiveSpeed = upSpeed > 0 ? upSpeed : 0;

  // If mostly horizontal drag → adjust aim direction
  const totalDX = p.x - aimDragStartX;
  const totalDY = p.y - swipeSamples[0].y;
  if (Math.abs(totalDX) > Math.abs(totalDY) * 1.2) {
    aimAngle = aimBaseAngle + totalDX * 0.007;
  }
}

function handlePointerUp() {
  if (state === 'aim' && mouse.down) {
    const vel = calcSwipeVelocity();
    const upSpeed = -vel.vy;
    if (upSpeed >= MIN_SWIPE_SPEED) {
      const pct = Math.min(1, (upSpeed - MIN_SWIPE_SPEED) / (MAX_SWIPE_SPEED - MIN_SWIPE_SPEED));
      deliverBowl(playerForTurn(turnIdx), aimAngle ?? defaultAimAngle(), pct * MAX_SPD);
      resetAim();
    }
    // else: no delivery — angle is kept, player swipes again
  }
  aimLiveSpeed = 0;
  mouse.down = false;
}

canvas.addEventListener('mousedown',  e => handlePointerDown(getPos(e)));
canvas.addEventListener('mousemove',  e => { if (mouse.down) handlePointerMove(getPos(e)); });
canvas.addEventListener('mouseup',    () => handlePointerUp());

canvas.addEventListener('touchstart', e => { e.preventDefault(); handlePointerDown(getPos(e)); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); handlePointerMove(getPos(e)); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); handlePointerUp(); },            { passive: false });

// Service worker (PWA offline support) — updateViaCache:none bypasses browser HTTP
// cache when checking for SW updates, so new deploys activate on next page load
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'activated') window.location.reload();
        });
      });
    })
    .catch(() => {});
}

// ── Splash screen ─────────────────────────────────────────────────
function buildSplash() {
  function seg(containerId, options, getVal, setVal) {
    const el = document.getElementById(containerId);
    options.forEach(([label, val]) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (val === getVal()) b.classList.add('sel');
      b.onclick = () => {
        setVal(val);
        el.querySelectorAll('button').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
      };
      el.appendChild(b);
    });
  }

  seg('sEnds', [[4,4],[6,6],[8,8],[10,10],[12,12]], ()=>splashCfg.ends, v=>splashCfg.ends=v);
  seg('sMode', [['vs AI','vs-ai'],['2 Players','vs-player']], ()=>splashCfg.mode, v=>splashCfg.mode=v);
  seg('sBias', [['Gentle',0.5],['Standard',1.0],['Strong',1.8],['Fierce',2.5]], ()=>splashCfg.biasVal, v=>splashCfg.biasVal=v);

  const szSlider = document.getElementById('sSizeSlider');
  const szLbl    = document.getElementById('sSizeLbl');
  szSlider.value = splashCfg.size;
  szLbl.textContent = splashCfg.size;
  szSlider.oninput = () => { splashCfg.size = +szSlider.value; szLbl.textContent = splashCfg.size; };

  function buildSwatches(id, getIdx, setIdx) {
    const el = document.getElementById(id);
    BOWL_COLOURS.forEach((col, i) => {
      const sw = document.createElement('div');
      sw.className = 'sw' + (i === getIdx() ? ' sel' : '');
      sw.style.background = col.main;
      sw.title = col.name;
      sw.onclick = () => {
        setIdx(i);
        el.querySelectorAll('.sw').forEach((s, j) => s.classList.toggle('sel', j === i));
      };
      el.appendChild(sw);
    });
  }
  buildSwatches('sP1', ()=>splashCfg.p1idx, i=>splashCfg.p1idx=i);
  buildSwatches('sP2', ()=>splashCfg.p2idx, i=>splashCfg.p2idx=i);

  const BG_OPTS = [
    ['hardwood',     'Hardwood',      'bg-hardwood'],
    ['green-carpet', 'Green Carpet',  'bg-green-carpet'],
    ['blue-carpet',  'Blue Carpet',   'bg-blue-carpet'],
    ['red-carpet',   'Red Carpet',    'bg-red-carpet'],
  ];
  const bgEl = document.getElementById('sBg');
  BG_OPTS.forEach(([val, label, cls]) => {
    const d = document.createElement('div');
    d.className = 'bg-opt ' + cls + (val === splashCfg.bg ? ' sel' : '');
    d.textContent = label;
    d.onclick = () => {
      splashCfg.bg = val;
      bgEl.querySelectorAll('.bg-opt').forEach(x => x.classList.remove('sel'));
      d.classList.add('sel');
    };
    bgEl.appendChild(d);
  });

  document.getElementById('btnStart').onclick = applyAndStart;
}

function applyAndStart() {
  ENDS     = splashCfg.ends;
  mode     = splashCfg.mode;
  RB       = 10 + splashCfg.size;          // size 0→10px … size 5→15px
  biasMult = splashCfg.biasVal;
  bgStyle  = splashCfg.bg;

  const col = BOWL_COLOURS[splashCfg.p1idx];
  C.p1 = col.main; C.p1d = col.dark;
  const col2 = BOWL_COLOURS[splashCfg.p2idx];
  C.p2 = col2.main; C.p2d = col2.dark;

  // Sync in-game bias slider
  const sl = document.getElementById('biasSlider');
  sl.value = biasMult;
  document.getElementById('biasValLabel').textContent = biasMult.toFixed(1) + '×';

  // Sync mode button + HUD label
  document.getElementById('btnMode').textContent = mode === 'vs-ai' ? 'vs AI' : '2P';
  document.getElementById('lbl2').textContent    = mode === 'vs-ai' ? 'AI' : 'P2';

  document.getElementById('splash').classList.add('hidden');
  startGame();
}

function showSplash() {
  clearTimeout(aiTimer);
  state = 'idle';
  document.getElementById('splash').classList.remove('hidden');
}

buildSplash();
showSplash();

requestAnimationFrame(loop);
</script>
</body>
</html>
